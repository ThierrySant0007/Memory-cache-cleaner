<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limpador de RAM</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="titlebar-drag-region"></div>
  
  <div class="container">
    <div class="header">
      <div class="icon-container">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="cpu-icon"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>
      </div>
      <h1>Limpador do Sistema</h1>
      <p>Libere o cache Standby do Windows e remova arquivos temporários inativos.</p>
    </div>

    <div class="action-area">
      <button id="clean-btn" class="btn-glow">
        <span class="btn-text">Limpar RAM</span>
        <div class="btn-background"></div>
      </button>

      <button id="clean-temp-btn" class="btn-glow">
        <span class="btn-text">Limpar Temp</span>
        <div class="btn-background" style="background: linear-gradient(90deg, #f59e0b, #ef4444, #f59e0b);"></div>
      </button>
      
      <div class="status-container">
        <div id="icon-indicator" class="icon-indicator">
          <div id="spinner" class="spinner" style="display: none;"></div>
          <svg id="checkmark" class="checkmark" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          <svg id="error-icon" class="error-icon" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
        </div>
        <p id="status" class="status text-muted">Pronto para limpar</p>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
